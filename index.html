<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memory Gravity</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; color: #fff; 
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        /* MÀN HÌNH NHẬP MÃ TỐI GIẢN */
        #pass-screen {
            position: fixed; inset: 0; z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #000; transition: 1s;
        }

        #hidden-input { position: absolute; opacity: 0; pointer-events: none; }
        
        .code-display { display: flex; gap: 10px; margin-bottom: 20px; }
        .code-dot {
            width: 10px; height: 10px; border: 1px solid #333; border-radius: 50%;
            transition: 0.3s;
        }
        .code-dot.active { background: #ff4d6d; border-color: #ff4d6d; transform: scale(1.3); }

        #err-msg { 
            color: #ff4d6d; font-size: 11px; letter-spacing: 2px; 
            opacity: 0; transition: 0.3s; margin-top: 20px;
        }

        /* SÂN KHẤU CHÍNH */
        #main-content {
            display: none; width: 100vw; height: 100vh;
            position: relative; overflow: hidden;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        /* THÔNG TIN NGÀY QUEN LƠ LỬNG */
        .info-container {
            position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 10; pointer-events: none;
        }

        .days-count {
            font-size: clamp(60px, 20vw, 100px); font-weight: 100; letter-spacing: -2px;
            background: linear-gradient(to bottom, #fff 40%, #ff4d6d 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255, 77, 109, 0.4));
        }

        .label { font-size: 11px; letter-spacing: 8px; color: rgba(255,255,255,0.4); margin-top: -10px; }
        .time-ticker { font-family: monospace; font-size: 14px; color: #444; margin-top: 20px; letter-spacing: 3px; }

        /* NƠI CÁC TẤM ẢNH ĐƯỢC CHÈN VÀO */
        #photo-container { position: absolute; inset: 0; z-index: 5; }

        /* PHONG CÁCH TẤM ẢNH THẬT */
        .photo {
            position: absolute; width: 100px; height: 130px;
            background-size: cover; background-position: center;
            border-radius: 5px; border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            pointer-events: auto; /* Cho phép tương tác chạm */
            cursor: pointer;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop><source src="Dù Cho Tận Thế.mp3" type="audio/mpeg"></audio>

    <div id="pass-screen" onclick="document.getElementById('hidden-input').focus()">
        <div class="code-display">
            <div class="code-dot"></div><div class="code-dot"></div><div class="code-dot"></div>
            <div class="code-dot"></div><div class="code-dot"></div><div class="code-dot"></div>
        </div>
        <input type="password" id="hidden-input" maxlength="6" inputmode="numeric" autofocus>
        <p id="err-msg">Anh hết thương em rồi... ☹</p>
    </div>

    <div id="main-content">
        <div class="info-container">
            <div class="label">KỶ NIỆM MỞ RA</div>
            <div class="days-count" id="d-num">0</div>
            <div class="label" style="color: #fff; margin-bottom: 20px;">DAYS TOGETHER</div>
            <div class="time-ticker" id="t-num">00 : 00 : 00</div>
        </div>
        <div id="photo-container"></div>
    </div>

    <script>
        const PASS = "221224"; // Mật khẩu
        const START_DATE = new Date("2024-12-22T22:00:00"); // Ngày kỷ niệm
        const album = Array.from({length: 19}, (_, i) => `./ad/anh${i+1}.jpg`); // 19 ảnh

        const input = document.getElementById('hidden-input');
        const dots = document.querySelectorAll('.code-dot');
        const screen = document.getElementById('pass-screen');
        const main = document.getElementById('main-content');

        input.addEventListener('input', function() {
            const val = this.value;
            dots.forEach((dot, i) => dot.classList.toggle('active', !!val[i]));

            if(val.length === 6) {
                if(val === PASS) {
                    screen.style.opacity = "0";
                    setTimeout(initMemoryGravity, 1000);
                } else {
                    document.getElementById('err-msg').style.opacity = "1";
                    this.value = "";
                    dots.forEach(d => d.classList.remove('active'));
                }
            }
        });

        function initMemoryGravity() {
            screen.style.display = "none";
            main.style.display = "block";
            document.getElementById('bgMusic').play().catch(()=>{});

            // Khởi tạo Matter.js Engine
            const { Engine, Render, Runner, Bodies, Composite, Mouse, MouseConstraint } = Matter;
            const engine = Engine.create();
            engine.gravity.y = 1; // Trọng lực ban đầu

            const width = window.innerWidth;
            const height = window.innerHeight;

            // Tạo các bức tường "tàng hình" để ảnh không bay ra ngoài
            const ground = Bodies.rectangle(width / 2, height + 30, width, 60, { isStatic: true });
            const leftWall = Bodies.rectangle(-30, height / 2, 60, height, { isStatic: true });
            const rightWall = Bodies.rectangle(width + 30, height / 2, 60, height, { isStatic: true });
            const ceiling = Bodies.rectangle(width / 2, -300, width, 60, { isStatic: true }); // Trần cao để ảnh rơi

            Composite.add(engine.world, [ground, leftWall, rightWall, ceiling]);

            // Tạo 19 tấm ảnh
            const container = document.getElementById('photo-container');
            album.forEach((src, i) => {
                setTimeout(() => {
                    const el = document.createElement('div');
                    el.className = 'photo';
                    el.style.backgroundImage = `url('${src}')`;
                    container.appendChild(el);

                    // Vị trí rơi ngẫu nhiên trên đỉnh
                    const x = 50 + Math.random() * (width - 100);
                    const y = -200 - Math.random() * 200;

                    // Tạo đối tượng vật lý cho ảnh
                    const body = Bodies.rectangle(x, y, 100, 130, {
                        frictionAir: 0.02, // Sức cản không khí nhẹ
                        restitution: 0.5, // Độ nảy
                        render: { opacity: 1 }
                    });

                    // Liên kết đối tượng vật lý với phần tử HTML
                    body.element = el;
                    Composite.add(engine.world, body);

                }, i * 300); // Mỗi 0.3s rơi một ảnh
            });

            // Đồng bộ hóa vị trí Matter.js với HTML
            (function update() {
                const bodies = Composite.allBodies(engine.world);
                bodies.forEach(body => {
                    if (body.element) {
                        const { x, y } = body.position;
                        // Cập nhật vị trí và góc xoay
                        body.element.style.transform = `translate(${x - 50}px, ${y - 65}px) rotate(${body.angle}rad)`;
                    }
                });
                Engine.update(engine);
                requestAnimationFrame(update);
            })();

            // TÍNH NĂNG NGHIÊNG ĐIỆN THOẠI
            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientation', (event) => {
                    // event.gamma: Nghiêng trái/phải (-90 đến 90)
                    // event.beta: Nghiêng trước/sau (-180 đến 180)
                    
                    const gx = Math.sin(event.gamma * (Math.PI / 180));
                    const gy = Math.sin(event.beta * (Math.PI / 180));

                    // Cập nhật trọng lực dựa trên góc nghiêng
                    if(gx && gy) {
                        engine.gravity.x = gx * 1.5; // Nhân hệ số để ảnh chạy nhạy hơn
                        engine.gravity.y = gy * 1.5;
                    }
                });
            }

            // Cho phép tương tác chạm và kéo ảnh bằng tay
            const mouse = Mouse.create(container);
            const mouseConstraint = MouseConstraint.create(engine, {
                mouse: mouse,
                constraint: { stiffness: 0.2, render: { visible: false } }
            });
            Composite.add(engine.world, mouseConstraint);

            setInterval(updateTimer, 1000);
        }

        function updateTimer() {
            const diff = new Date() - START_DATE;
            const d = Math.floor(diff / 86400000);
            const h = String(Math.floor((diff / 3600000) % 24)).padStart(2,'0');
            const m = String(Math.floor((diff / 60000) % 60)).padStart(2,'0');
            const s = String(Math.floor((diff / 1000) % 60)).padStart(2,'0');
            document.getElementById('d-num').innerText = d;
            document.getElementById('t-num').innerText = `${h}H : ${m}M : ${s}S`;
        }
    </script>
</body>
</html>
