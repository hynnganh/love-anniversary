<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memory Particle Sphere</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; color: #fff; 
            font-family: 'Montserrat', sans-serif;
            overflow: hidden; height: 100vh;
            touch-action: none;
        }

        #pass-screen {
            position: fixed; inset: 0; z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #000; transition: 1s;
        }

        #hidden-input { position: absolute; opacity: 0; pointer-events: none; }
        
        .code-display { display: flex; gap: 10px; margin-bottom: 20px; }
        .code-dot {
            width: 10px; height: 10px; border: 1px solid #333; border-radius: 50%;
            transition: 0.3s;
        }
        .code-dot.active { background: #ff4d6d; border-color: #ff4d6d; transform: scale(1.5); }

        #sphere-stage {
            display: none; width: 100vw; height: 100vh;
            position: relative; overflow: hidden; opacity: 0; transition: 2s;
            perspective: 1000px;
        }

        .center-content {
            position: absolute; top: 10%; left: 50%; transform: translate(-50%, 0);
            text-align: center; z-index: 10; pointer-events: none;
        }

        .days-count {
            font-size: 80px; font-weight: 100;
            background: linear-gradient(to bottom, #fff, #ff4d6d);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .label { font-size: 11px; letter-spacing: 5px; color: rgba(255,255,255,0.4); }

        .particle-photo {
            position: absolute; width: 30px; height: 30px;
            background-size: cover; background-position: center;
            border-radius: 50%;
            border: 2px solid #fff;
            transition: 0.8s cubic-bezier(0.2, 1, 0.3, 1);
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
        }

        .particle-photo.active {
            width: 85vw; height: 120vw;
            max-width: 350px; max-height: 500px;
            border-radius: 12px; border: 4px solid #fff;
            z-index: 999 !important;
            left: 50% !important; top: 50% !important;
            transform: translate(-50%, -50%) !important;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        .time-ticker {
            position: fixed; bottom: 30px; font-family: monospace;
            font-size: 14px; color: #333; width: 100%; text-align: center;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop><source src="Dù Cho Tận Thế.mp3" type="audio/mpeg"></audio>

    <div id="pass-screen" onclick="document.getElementById('hidden-input').focus()">
        <div class="code-display">
            <div class="code-dot"></div><div class="code-dot"></div><div class="code-dot"></div>
            <div class="code-dot"></div><div class="code-dot"></div><div class="code-dot"></div>
        </div>
        <input type="password" id="hidden-input" maxlength="6" inputmode="numeric" autofocus>
    </div>

    <div id="sphere-stage">
        <div class="center-content">
            <div class="days-count" id="d-num">0</div>
            <div class="label">DAYS TOGETHER</div>
        </div>
        <div id="photo-container" style="position: absolute; width: 100%; height: 100%; transform-style: preserve-3d;"></div>
        <div class="time-ticker" id="t-num">00H : 00M : 00S</div>
    </div>

    <script>
        const PASS = "221224";
        const START_DATE = new Date("2024-12-22T22:00:00");
        // FIX: Đã đưa về đường dẫn ảnh gốc của bạn
        const album = Array.from({length: 19}, (_, i) => `./ad/anh${i+1}.jpg`);

        const input = document.getElementById('hidden-input');
        const dots = document.querySelectorAll('.code-dot');
        let rotationX = 0, rotationY = 0, isDragging = false, startX, startY;
        const sphereRadius = window.innerWidth < 500 ? 150 : 250;

        input.addEventListener('input', function() {
            const val = this.value;
            dots.forEach((dot, i) => dot.classList.toggle('active', !!val[i]));
            if(val.length === 6) {
                if(val === PASS) {
                    document.getElementById('pass-screen').style.opacity = "0";
                    setTimeout(initSphere, 800);
                } else {
                    this.value = "";
                    dots.forEach(d => d.classList.remove('active'));
                }
            }
        });

        function initSphere() {
            document.getElementById('pass-screen').style.display = "none";
            const stage = document.getElementById('sphere-stage');
            stage.style.display = "block";
            setTimeout(() => stage.style.opacity = "1", 50);
            document.getElementById('bgMusic').play().catch(()=>{});

            const container = document.getElementById('photo-container');
            const phi = Math.PI * (3 - Math.sqrt(5));

            album.forEach((src, i) => {
                const img = document.createElement('div');
                img.className = 'particle-photo';
                img.style.backgroundImage = `url('${src}')`;
                
                const y = 1 - (i / (album.length - 1)) * 2;
                const radius = Math.sqrt(1 - y * y);
                const theta = phi * i;

                img.dataset.x = Math.cos(theta) * radius * sphereRadius;
                img.dataset.y = y * sphereRadius;
                img.dataset.z = Math.sin(theta) * radius * sphereRadius;
                
                img.onclick = (e) => {
                    e.stopPropagation();
                    const active = document.querySelector('.particle-photo.active');
                    if(active) active.classList.remove('active');
                    img.classList.add('active');
                };
                container.appendChild(img);
            });

            window.onpointerdown = e => { isDragging = true; startX = e.clientX; startY = e.clientY; };
            window.onpointermove = e => {
                if(!isDragging || document.querySelector('.particle-photo.active')) return;
                rotationY += (e.clientX - startX) * 0.2;
                rotationX -= (e.clientY - startY) * 0.2;
                startX = e.clientX; startY = e.clientY;
                render();
            };
            window.onpointerup = () => isDragging = false;
            stage.onclick = () => {
                const active = document.querySelector('.particle-photo.active');
                if(active) active.classList.remove('active');
            };

            render();
            setInterval(updateTimer, 1000);
        }

        function render() {
            const photos = document.querySelectorAll('.particle-photo');
            const cosX = Math.cos(rotationX * Math.PI/180), sinX = Math.sin(rotationX * Math.PI/180);
            const cosY = Math.cos(rotationY * Math.PI/180), sinY = Math.sin(rotationY * Math.PI/180);

            photos.forEach(img => {
                if(img.classList.contains('active')) return;
                let x = parseFloat(img.dataset.x), y = parseFloat(img.dataset.y), z = parseFloat(img.dataset.z);
                let tx = x * cosY - z * sinY, tz = x * sinY + z * cosY;
                let finalY = y * cosX - tz * sinX, finalZ = y * sinX + tz * cosX;
                
                const scale = 800 / (800 + finalZ);
                img.style.left = (tx * scale + window.innerWidth/2) + 'px';
                img.style.top = (finalY * scale + window.innerHeight/2) + 'px';
                img.style.transform = `translate(-50%, -50%) scale(${scale})`;
                img.style.zIndex = Math.round(finalZ);
                img.style.opacity = (finalZ + sphereRadius) / (2 * sphereRadius) * 0.7 + 0.3;
            });
        }

        function updateTimer() {
            const diff = new Date() - START_DATE;
            document.getElementById('d-num').innerText = Math.floor(diff / 86400000);
            const h = String(Math.floor((diff / 3600000) % 24)).padStart(2,'0');
            const m = String(Math.floor((diff / 60000) % 60)).padStart(2,'0');
            const s = String(Math.floor((diff / 1000) % 60)).padStart(2,'0');
            document.getElementById('t-num').innerText = `${h}H : ${m}M : ${s}S`;
        }
    </script>
</body>
</html>
